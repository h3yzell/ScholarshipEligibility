<!DOCTYPE html>
<html>

<head>
    <title>Scholarship Eligibility Check</title>
</head>

<body>

    <h2>Scholarship Eligibility Check</h2>

    <form action="/submitForm" method="POST">

        <label>Name:</label><br>
        <input type="text" name="name" required>
        <br><br>

        <label>Student ID:</label><br>
        <input type="text" name="student_id" required>
        <br><br>

        <label>IC:</label><br>
        <input type="text" name="ic" required>
        <br><br>

        <label>Education:</label><br>
        <input type="text" name="education" required>
        <br><br>

        <label>Phone Number:</label><br>
        <input type="text" name="phone" required>
        <br><br>

        <label>CGPA:</label><br>
        <input type="number" step="0.01" name="CGPA" required>
        <br><br>

        <label>Medication Problems:</label><br>
        <textarea name="medication_problems"></textarea>
        <br><br>

        <label>Family Income:</label><br>
        <input type="number" step="0.01" name="family_income" required>
        <br><br>

        <label>Household Size:</label><br>
        <input type="number" name="household_size" required>
        <br><br>

        <button type="submit">Submit</button>

    </form>

</body>

</html>
