<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scholarship Eligibility Check</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

<div class="container">

    <div class="header">
        <p class="header-label">Application Form</p>
        <h1>Scholarship<br>Eligibility Check</h1>
        <div class="header-divider"></div>
    </div>

    <form action="/submitForm" method="POST" novalidate>

        <!-- Personal Information -->
        <div class="section">
            <p class="section-title">Personal Information</p>
            <div class="field-grid">
                <div class="field">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="As per IC" required>
                </div>
            </div>
            <div class="field-grid cols-2" style="margin-top: 20px;">
                <div class="field">
                    <label for="ic">IC Number</label>
                    <input type="text" id="ic" name="ic" placeholder="e.g. 990101-14-1234" required>
                </div>
                <div class="field">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="e.g. 012-345 6789" required>
                </div>
            </div>
        </div>

        <!-- Academic Information -->
        <div class="section">
            <p class="section-title">Academic Information</p>
            <div class="field-grid cols-2">
                <div class="field">
                    <label for="student_id">Student ID</label>
                    <input type="text" id="student_id" name="student_id" placeholder="e.g. S12345678" required>
                </div>
                <div class="field">
                    <label for="CGPA">CGPA</label>
                    <input type="number" id="CGPA" name="CGPA" step="0.01" min="0" max="4.00" placeholder="0.00 – 4.00" required>
                </div>
            </div>
            <div class="field-grid" style="margin-top: 20px;">
                <div class="field">
                    <label for="education">Level of Education</label>
                    <input type="text" id="education" name="education" placeholder="e.g. Bachelor of Science" required>
                </div>
            </div>
        </div>

        <!-- Financial Information -->
        <div class="section">
            <p class="section-title">Financial Background</p>
            <div class="field-grid cols-2">
                <div class="field">
                    <label for="family_income">Monthly Family Income (RM)</label>
                    <input type="number" id="family_income" name="family_income" step="0.01" min="0" placeholder="0.00" required>
                </div>
                <div class="field">
                    <label for="household_size">Household Size</label>
                    <input type="number" id="household_size" name="household_size" min="1" placeholder="No. of dependants" required>
                </div>
            </div>
        </div>

        <!-- Additional Information -->
        <div class="section">
            <p class="section-title">Additional Information</p>
            <div class="field">
                <label for="medication_problems">Medical Conditions <span style="font-weight:300;text-transform:none;letter-spacing:0;">(optional)</span></label>
                <textarea id="medication_problems" name="medication_problems" placeholder="Describe any medical conditions relevant to your application…"></textarea>
                <span class="field-hint">Leave blank if not applicable.</span>
            </div>
        </div>

        <!-- Submit -->
        <div class="submit-area">
            <button type="submit" class="btn-submit">Submit Application</button>
            <p class="submit-note">All fields marked as required<br>must be completed.</p>
        </div>

    </form>

    <div class="footer-mark">
        Scholarship Eligibility Portal &mdash; Confidential
    </div>

</div>

</body>
</html>
